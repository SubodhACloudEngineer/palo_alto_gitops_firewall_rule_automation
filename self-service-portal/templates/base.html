<!DOCTYPE html>
<html>
<head>
    <title>{% block title %}Self-Service Portal{% endblock %} - NTT DATA</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/logo.png') }}">
    <style>
        /* ============================================
           RESET & BASE STYLES
           ============================================ */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0067B1 0%, #004A8F 100%);
            min-height: 100vh;
            padding: 20px;
        }

        /* ============================================
           LAYOUT - SIDEBAR + MAIN
           ============================================ */
        .page-wrapper {
            display: flex;
            max-width: 1600px;
            margin: 0 auto;
            gap: 20px;
        }
        .sidebar {
            width: 220px;
            flex-shrink: 0;
        }
        .sidebar-nav {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            padding: 20px;
            position: sticky;
            top: 20px;
        }
        .sidebar-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            padding-bottom: 15px;
            margin-bottom: 15px;
            border-bottom: 1px solid #e0e0e0;
        }
        .sidebar-logo img {
            height: 30px;
            width: auto;
        }
        .sidebar-logo span {
            font-weight: 600;
            font-size: 14px;
            color: #333;
        }
        .nav-section {
            margin-bottom: 20px;
        }
        .nav-section-title {
            font-size: 11px;
            font-weight: 600;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 10px;
        }
        .nav-link {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            color: #333;
            text-decoration: none;
            border-radius: 6px;
            font-size: 14px;
            transition: all 0.2s;
            margin-bottom: 4px;
        }
        .nav-link:hover {
            background-color: #E3F2FD;
            color: #0067B1;
        }
        .nav-link.active {
            background: linear-gradient(135deg, #0067B1 0%, #004A8F 100%);
            color: white;
        }
        .nav-link-icon {
            font-size: 16px;
            width: 20px;
            text-align: center;
        }
        .main-content {
            flex-grow: 1;
            min-width: 0;
        }

        /* ============================================
           CONTAINER STYLES
           ============================================ */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background-color: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        .container.narrow {
            max-width: 900px;
        }
        .container.medium {
            max-width: 1000px;
        }
        .container.wide {
            max-width: 1200px;
        }

        /* ============================================
           HEADER STYLES
           ============================================ */
        .header {
            background: linear-gradient(135deg, #0067B1 0%, #004A8F 100%);
            padding: 30px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .logo {
            height: 50px;
            width: auto;
        }
        .header-title {
            color: white;
        }
        .header-title h1 {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 5px;
        }
        .header-title p {
            font-size: 14px;
            opacity: 0.9;
        }
        .header-content {
            flex-grow: 1;
        }
        .header-subtitle {
            color: rgba(255, 255, 255, 0.9);
            font-size: 14px;
        }
        .header-links a {
            margin-left: 15px;
            padding: 10px 20px;
            background-color: rgba(255, 255, 255, 0.2);
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            transition: background-color 0.3s;
        }
        .header-links a:hover {
            background-color: rgba(255, 255, 255, 0.3);
        }
        .service-icon-large {
            font-size: 48px;
        }

        /* ============================================
           CONTENT STYLES
           ============================================ */
        .content {
            padding: 40px;
        }
        .back-link {
            display: inline-block;
            margin-bottom: 30px;
            color: #0067B1;
            text-decoration: none;
            font-weight: 500;
        }
        .back-link:hover {
            text-decoration: underline;
        }

        /* ============================================
           BUTTON STYLES
           ============================================ */
        .new-request-btn {
            background: linear-gradient(135deg, #0067B1 0%, #004A8F 100%);
            color: white;
            padding: 15px 30px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            text-decoration: none;
            display: inline-block;
            margin-bottom: 30px;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .new-request-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 103, 177, 0.4);
        }
        .btn {
            padding: 14px 30px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-primary {
            background: linear-gradient(135deg, #0078D4 0%, #004A8F 100%);
            color: white;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0,120,212,0.3);
        }
        .btn-secondary {
            background: #e0e0e0;
            color: #333;
        }
        .btn-secondary:hover { background: #d0d0d0; }
        button {
            padding: 14px 32px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s;
        }
        button[type="submit"] {
            background: linear-gradient(135deg, #0067B1 0%, #004A8F 100%);
            color: white;
        }
        button[type="submit"]:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 103, 177, 0.4);
        }
        button[type="submit"]:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        .cancel-btn {
            background-color: #757575;
            color: white;
        }
        .cancel-btn:hover {
            background-color: #616161;
        }
        .button-group {
            margin-top: 30px;
            display: flex;
            gap: 15px;
        }
        .view-btn {
            background-color: #0067B1;
            color: white;
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
            display: inline-block;
            transition: background-color 0.3s;
        }
        .view-btn:hover {
            background-color: #004A8F;
        }
        .netbox-link {
            display: inline-block;
            margin-top: 20px;
            padding: 14px 28px;
            background: linear-gradient(135deg, #0067B1 0%, #004A8F 100%);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.3s;
        }
        .netbox-link:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 103, 177, 0.4);
        }

        /* ============================================
           TABLE STYLES
           ============================================ */
        h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 24px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            padding: 16px;
            text-align: left;
            border-bottom: 1px solid #e0e0e0;
        }
        th {
            background: linear-gradient(135deg, #0067B1 0%, #004A8F 100%);
            color: white;
            font-weight: 600;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        tr:hover {
            background-color: #f8f9fa;
        }

        /* ============================================
           STATUS BADGES
           ============================================ */
        .status {
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            display: inline-block;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .status-pending { background-color: #FFA726; color: white; }
        .status-running { background-color: #42A5F5; color: white; }
        .status-automation { background-color: #42A5F5; color: white; }
        .status-ansible { background-color: #42A5F5; color: white; }
        .status-syncing { background-color: #26C6DA; color: white; }
        .status-completed { background-color: #66BB6A; color: white; }
        .status-failed { background-color: #EF5350; color: white; }
        .status-timeout { background-color: #EF5350; color: white; }

        /* ============================================
           FORM STYLES
           ============================================ */
        .form-section {
            margin-bottom: 30px;
            padding: 25px;
            background: #f8f9fa;
            border-radius: 8px;
            border: 1px solid #e0e0e0;
        }
        .form-section h3 {
            color: #333;
            font-size: 16px;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #0078D4;
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 15px;
        }
        .form-row.full-width { grid-template-columns: 1fr; }
        .form-group {
            margin-bottom: 25px;
        }
        .form-group.full-width {
            grid-column: 1 / -1;
        }
        .form-group label {
            display: block;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
            font-size: 14px;
        }
        .form-group label .required { color: #dc3545; margin-left: 3px; }
        .form-group small {
            display: block;
            color: #666;
            font-size: 12px;
            margin-top: 4px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
            font-size: 14px;
        }
        .help-text {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
        }
        .section-title {
            font-size: 18px;
            font-weight: 600;
            color: #333;
            margin: 30px 0 20px 0;
            padding-bottom: 10px;
            border-bottom: 2px solid #e0e0e0;
        }
        input[type="text"],
        input[type="number"],
        select,
        textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.3s;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #0067B1;
            box-shadow: 0 0 0 3px rgba(0,120,212,0.1);
        }
        select {
            background-color: white;
            cursor: pointer;
        }
        select:disabled {
            background-color: #f5f5f5;
            cursor: not-allowed;
        }

        /* ============================================
           CHECKBOX & RADIO STYLES
           ============================================ */
        .checkbox-group {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
        }
        .checkbox-group label {
            font-weight: normal;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .checkbox-group input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }
        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 15px;
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .checkbox-item:hover { border-color: #0078D4; }
        .checkbox-item.checked {
            border-color: #0078D4;
            background: #E6F3FF;
        }
        .checkbox-item input { margin: 0; }
        .radio-group {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }
        .radio-group label {
            font-weight: normal;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .radio-group label:hover {
            border-color: #0067B1;
        }
        .radio-group label.selected {
            background-color: #E3F2FD;
            border-color: #0067B1;
        }
        .radio-group input[type="radio"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }
        .radio-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 20px;
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .radio-item:hover { border-color: #0078D4; }
        .radio-item.selected {
            border-color: #0078D4;
            background: #E6F3FF;
        }
        .radio-item input { margin: 0; }

        /* ============================================
           INFO/WARNING/ERROR BOXES
           ============================================ */
        .info-box {
            background-color: #E3F2FD;
            border-left: 4px solid #0067B1;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 25px;
        }
        .info-box p {
            color: #1565C0;
            font-size: 14px;
            margin: 0;
        }
        .info-box.info { background: #E7F3FF; border-color: #B6D4FE; }
        .info-box.info p { color: #084298; }
        .info-box.warning {
            background-color: #FFF3CD;
            border-color: #FFE69C;
        }
        .info-box.warning p { color: #664D03; }
        .warning-box {
            background-color: #FFF3E0;
            border-left: 4px solid #FF9800;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 25px;
            display: none;
        }
        .warning-box.visible {
            display: block;
        }
        .warning-box p {
            color: #E65100;
            font-size: 14px;
            margin: 0;
        }
        .error-box {
            background-color: #FFEBEE;
            border-left: 4px solid #F44336;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 25px;
        }
        .error-box p {
            color: #C62828;
            font-size: 14px;
            margin: 0;
        }
        .error-box code {
            background-color: #FFCDD2;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: monospace;
        }

        /* ============================================
           SERVICE CATALOG STYLES
           ============================================ */
        .subtitle {
            color: #666;
            margin-bottom: 30px;
        }
        .service-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 25px;
            margin-top: 30px;
        }
        .service-card {
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            padding: 25px;
            transition: all 0.3s;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            display: block;
        }
        .service-card:hover {
            border-color: #0067B1;
            box-shadow: 0 5px 20px rgba(0, 103, 177, 0.2);
            transform: translateY(-2px);
        }
        .service-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }
        .service-title {
            font-size: 20px;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }
        .service-category {
            display: inline-block;
            padding: 4px 12px;
            background-color: #E3F2FD;
            color: #0067B1;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 12px;
        }
        .service-description {
            color: #666;
            font-size: 14px;
            line-height: 1.5;
        }
        .service-badge {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 12px 20px;
            background: linear-gradient(135deg, #E6F3FF 0%, #CCE5FF 100%);
            border-radius: 8px;
            margin-bottom: 30px;
            border-left: 4px solid #0078D4;
        }
        .service-badge-icon { font-size: 28px; }
        .service-badge-text h3 { color: #0078D4; font-size: 18px; }
        .service-badge-text p { color: #666; font-size: 13px; }

        /* ============================================
           REQUEST DETAILS STYLES
           ============================================ */
        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .info-item {
            background-color: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            border-left: 4px solid #0067B1;
        }
        .info-item label {
            font-weight: 600;
            color: #666;
            font-size: 12px;
            text-transform: uppercase;
            display: block;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }
        .info-item .value {
            color: #333;
            font-size: 16px;
            font-weight: 500;
        }
        .log-entry {
            padding: 12px 16px;
            margin: 8px 0;
            background-color: #f8f9fa;
            border-left: 4px solid #0067B1;
            border-radius: 6px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
        }
        .log-timestamp {
            color: #0067B1;
            font-weight: bold;
            margin-right: 12px;
        }
        .output-box {
            background-color: #1e1e1e;
            color: #d4d4d4;
            padding: 20px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            overflow-x: auto;
            max-height: 400px;
            overflow-y: auto;
            white-space: pre-wrap;
        }

        /* ============================================
           COST ESTIMATE
           ============================================ */
        .cost-estimate {
            background: #E8F5E9;
            border: 1px solid #A5D6A7;
            border-radius: 8px;
            padding: 15px;
            margin-top: 20px;
        }
        .cost-estimate h4 { color: #2E7D32; margin-bottom: 10px; }
        .cost-estimate p { color: #1B5E20; font-size: 14px; }

        /* ============================================
           SUBMIT SECTION
           ============================================ */
        .submit-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 20px;
            border-top: 1px solid #e0e0e0;
            margin-top: 30px;
        }

        /* ============================================
           EMPTY STATE
           ============================================ */
        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: #999;
        }
        .empty-state svg {
            width: 120px;
            height: 120px;
            margin-bottom: 30px;
            opacity: 0.2;
        }
        .empty-state h3 {
            font-size: 24px;
            margin-bottom: 10px;
            color: #666;
        }
        .empty-state p {
            font-size: 16px;
        }

        /* ============================================
           ERROR PAGE STYLES
           ============================================ */
        .error-container {
            max-width: 600px;
            background-color: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            overflow: hidden;
            text-align: center;
            margin: 0 auto;
        }
        .error-header {
            background: linear-gradient(135deg, #EF5350 0%, #C62828 100%);
            padding: 40px;
            color: white;
        }
        .error-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }
        .error-header h1 {
            font-size: 24px;
            font-weight: 600;
        }
        .error-content {
            padding: 40px;
        }
        .error-message {
            font-size: 16px;
            color: #333;
            line-height: 1.6;
            margin-bottom: 30px;
        }
        .back-btn {
            display: inline-block;
            padding: 14px 40px;
            background: linear-gradient(135deg, #0067B1 0%, #004A8F 100%);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.3s;
        }
        .back-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 103, 177, 0.4);
        }

        /* ============================================
           FOOTER
           ============================================ */
        .footer {
            background-color: #f8f9fa;
            padding: 20px 40px;
            text-align: center;
            color: #666;
            font-size: 13px;
            border-top: 1px solid #e0e0e0;
        }

        /* ============================================
           LOADING INDICATOR
           ============================================ */
        .loading-indicator {
            color: #666;
            font-size: 13px;
            padding: 10px;
        }
        .conditional-field {
            display: none;
        }
        .conditional-field.visible {
            display: block;
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <div class="page-wrapper">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <nav class="sidebar-nav">
                <div class="sidebar-logo">
                    <img src="{{ url_for('static', filename='images/logo.svg') }}" alt="NTT DATA" onerror="this.src='{{ url_for('static', filename='images/logo.png') }}'">
                    <span>Portal</span>
                </div>

                <div class="nav-section">
                    <div class="nav-section-title">Main</div>
                    <a href="/" class="nav-link {% if request.endpoint == 'home' %}active{% endif %}">
                        <span class="nav-link-icon">🏠</span>
                        Dashboard
                    </a>
                    <a href="/new_request" class="nav-link {% if request.endpoint == 'new_request' %}active{% endif %}">
                        <span class="nav-link-icon">📋</span>
                        Service Catalog
                    </a>
                </div>

                <div class="nav-section">
                    <div class="nav-section-title">Services</div>
                    <a href="/request_form/palo_alto_firewall_rule" class="nav-link">
                        <span class="nav-link-icon">🔥</span>
                        Firewall Rules
                    </a>
                    <a href="/request_form/azure_vm" class="nav-link">
                        <span class="nav-link-icon">☁️</span>
                        Azure VMs
                    </a>
                    <a href="/deploy" class="nav-link">
                        <span class="nav-link-icon">🚀</span>
                        Deploy App
                    </a>
                </div>

                <div class="nav-section">
                    <div class="nav-section-title">External</div>
                    <a href="{{ netbox_url if netbox_url else '#' }}" target="_blank" class="nav-link">
                        <span class="nav-link-icon">📊</span>
                        NetBox CMDB
                    </a>
                </div>
